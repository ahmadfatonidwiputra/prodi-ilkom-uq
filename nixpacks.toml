[phases.setup]
nixPkgs = ["php82", "nodejs_20"]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "npm install",
  "npm run build"
]

[start]
cmd = "php artisan config:clear && php artisan route:clear && php artisan view:clear && php artisan event:clear && php artisan migrate --force && php artisan db:seed --class=SuperAdminSeeder --force && php artisan config:cache && php artisan route:cache && php artisan serve --host=0.0.0.0 --port=$PORT"
